<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/funcionario.css">
  <title>Registro Pedidos</title>
</head>
<body>

  <div class="sideBar">
    <h1>Restaurante</h1>
    <p onclick="window.location.href='funcionario.html'">Novo Pedido</p>
    <p onclick="window.location.href='historico.html'">Historico</p>

    <button class="btnSair" onclick="sair()">Sair</button>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Funcionario</h2>
    </div>

    <div class="content">

      <div class="card-form">
        <h2>Novo Pedido</h2>

        <div class="formularios">

          <div class="divMesa">
            <label for="mesaCliente">Mesa</label>
            <input type="number" id="mesaCliente" placeholder="-">
          </div>
           
          <div class="LinhaWrapper">
               <div class="divNomeCliente">
            <label for="nomeCliente">Nome do Cliente</label>
            <input type="text" id="nomeCliente" placeholder="Nome">
          </div>

          <div class="divSetorCozinha">
            <label for="setorCozinha">Setor</label>
            <select name="setorCozinha" id="setoresCozinha">
              <option value="Copa">Copa</option>
              <option value="Cozinha">Cozinha</option>
            </select>
          </div>
          </div>
        
        <div class="LinhaWrapper">
  <div class="divTipoProduto">
    <label for="TipoProduto">Produto</label>
    <select name="TipoProduto" id="TiposProdutos"></select>
  </div>

  <div class="divQuantidade">
    <label for="quantidadePedidos">Quantidade</label>
    <input type="number" id="quantidadePedidos" placeholder="">
  </div>

  <button onclick="criarPedido()" id="btnConfirmar">Confirmar</button>
</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">Pedidos do Dia</div>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Mesa</th>
              <th>Clientes</th>
              <th>Setor</th>
              <th>Data/Hora</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tabela-pedidosDia"></tbody>
        </table>
      </div>
    </div>

    <div class="footer">
      <p>v1.0</p>
      <p>Sistema Restaurante</p>
    </div>

    <div id="msgSucesso" class="msgSucesso" style="display:none;">Pedido criado com sucesso!</div>

  </div>

  <script src="js/funcionario.js"></script>
</body>
</html>
